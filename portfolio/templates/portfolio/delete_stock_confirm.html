{% extends 'portfolio/base.html' %}

{% block content %}
<div class="container">
    <div class="row justify-content-center">
        <div class="col-md-8">
            <div class="card p-4 mt-4 text-center border-danger">
                <h2 class="card-title text-danger">Confirm Deletion</h2>
                <p class="lead">
                    Are you sure you want to delete your holding of <strong>{{ stock.quantity }} shares</strong> of <strong>{{ stock.ticker }}</strong>?
                </p>
                <p>This action cannot be undone.</p>
                
                <form method="post">
                    {% csrf_token %}
                    <div class="d-grid gap-2 d-md-flex justify-content-md-center mt-4">
                        <a href="{% url 'dashboard' %}" class="btn btn-secondary">Cancel</a>
                        <button type="submit" class="btn btn-danger">Yes, Delete It</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
