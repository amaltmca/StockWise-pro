{% extends 'portfolio/base.html' %}
{% load crispy_forms_tags %}

{% block content %}
<div class="container">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card p-4 mt-5">
                <h3 class="card-title text-center mb-4">Reset Password</h3>
                <p class="text-muted text-center small">Enter your email and we'll send you instructions to reset your password.</p>
                <form method="post">
                    {% csrf_token %}
                    {{ form|crispy }}
                    
                    <div class="d-grid gap-2 d-md-flex justify-content-md-end mt-4">
                        <a href="{% url 'login' %}" class="btn btn-secondary me-md-2">Back to Login</a>
                        <button type="submit" class="btn btn-primary">Send Reset Link</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
